{% extends 'mainwindow/base.html' %}
{% load static %}

{% block title %}비회원 로그인 | 딱맞춤{% endblock %}

{% block extra_css %}
<style>
    .login-container {
        max-width: 600px;
        margin: 80px auto;
        padding: 0 20px;
    }
    .form-panel {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 24px;
        padding: 50px;
        text-align: center;
        box-shadow: 0 10px 40px rgba(0,0,0,0.05);
    }
    .panel-icon {
        width: 80px;
        height: 80px;
        background: #f1f5f9;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 30px;
        font-size: 32px;
        color: #64748b;
    }
    .form-panel h2 {
        font-size: 24px;
        font-weight: 800;
        color: #1e293b;
        margin-bottom: 12px;
    }
    .form-panel p {
        color: #64748b;
        font-size: 15px;
        line-height: 1.6;
        margin-bottom: 35px;
    }
    .field-group {
        text-align: left;
        margin-bottom: 25px;
    }
    .field-label {
        display: block;
        font-size: 14px;
        font-weight: 700;
        color: #334155;
        margin-bottom: 8px;
    }
    .form-input {
        width: 100%;
        padding: 14px;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        font-size: 15px;
    }
    .btn-submit {
        width: 100%;
        padding: 18px;
        background: #475569;
        color: #fff;
        border-radius: 12px;
        font-weight: 700;
        border: none;
        cursor: pointer;
        font-size: 16px;
        transition: background 0.2s;
    }
    .btn-submit:hover {
        background: #334155;
    }
    .info-notice {
        margin-top: 30px;
        font-size: 13px;
        color: #94a3b8;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-container fade-in">
    <form method="POST" action="{% url 'guest_login' %}" class="form-panel">
        {% csrf_token %}
        <div class="panel-icon"><i class="fas fa-user-secret"></i></div>
        <h2>비회원 로그인</h2>
        <p>회원 가입 없이 간편하게 정책 매칭 서비스를<br>체험해보실 수 있습니다.</p>

        <div class="field-group">
            <label class="field-label">사용자 닉네임</label>
            <input type="text" name="guest_name" class="form-input" placeholder="로그인 후 사용할 이름을 입력하세요" required>
        </div>

        <button type="submit" class="btn-submit">비회원으로 시작하기</button>

        <div class="info-notice">
            <i class="fas fa-info-circle"></i> 비회원 로그인 시 마이리포트는 해당 세션 동안만 유지되며 브라우저 종료 시 삭제됩니다.
        </div>
    </form>
</div>
{% endblock %}
