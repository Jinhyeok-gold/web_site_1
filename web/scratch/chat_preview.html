<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1:1 상담 채팅 미리보기</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f1f5f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .btn-test { padding: 15px 30px; background: #1a4f8b; color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-test:hover { background: #0f3661; box-shadow: 0 5px 15px rgba(26, 79, 139, 0.3); }

        /* Modal Structure */
        .chat-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px);
            display: flex; justify-content: flex-end; align-items: flex-end;
            padding: 30px; box-sizing: border-box; visibility: hidden; opacity: 0; transition: 0.3s; z-index: 9999;
        }
        .chat-overlay.active { visibility: visible; opacity: 1; }

        .chat-window {
            width: 400px; height: 600px; background: white; border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            display: flex; flex-direction: column; overflow: hidden;
            transform: translateY(20px); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .chat-overlay.active .chat-window { transform: translateY(0); }

        .chat-header {
            padding: 20px; background: #1a4f8b; color: white;
            display: flex; justify-content: space-between; align-items: center;
        }
        .chat-profile { display: flex; align-items: center; gap: 12px; }
        .profile-img { width: 40px; height: 40px; border-radius: 50%; background: #eee; }
        .profile-info { display: flex; flex-direction: column; }
        .profile-name { font-weight: 700; font-size: 15px; }
        .profile-status { font-size: 11px; opacity: 0.8; }

        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; background: #f8fafc; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.5; }
        .msg-bot { background: white; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #e2e8f0; }
        .msg-user { background: #1a4f8b; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }

        .chat-input-area { padding: 20px; border-top: 1px solid #e2e8f0; display: flex; gap: 10px; background: white; }
        .chat-input { flex: 1; border: 1px solid #e2e8f0; border-radius: 12px; padding: 10px 15px; outline: none; transition: 0.2s; }
        .chat-input:focus { border-color: #1a4f8b; }
        .btn-send { background: #1a4f8b; color: white; border: none; border-radius: 10px; padding: 10px 15px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <button class="btn-test" onclick="document.getElementById('chatOverlay').classList.add('active')">상담사 연결하기</button>

    <div class="chat-overlay" id="chatOverlay" onclick="if(event.target === this) this.classList.remove('active')">
        <div class="chat-window">
            <div class="chat-header">
                <div class="chat-profile">
                    <img src="https://ui-avatars.com/api/?name=C&background=random" class="profile-img" alt="">
                    <div class="profile-info">
                        <span class="profile-name">정책 상담사 하이(Hi)</span>
                        <span class="profile-status">실시간 상담 가능</span>
                    </div>
                </div>
                <button style="background:none; border:none; color:white; cursor:pointer; font-size:20px;" onclick="document.getElementById('chatOverlay').classList.remove('active')">✕</button>
            </div>
            <div class="chat-messages">
                <div class="message msg-bot">
                    안녕하세요! 딱맞춤 정책 전문가입니다. <br>
                    사용자님의 진단 데이터를 기반으로 궁금하신 점을 해결해 드릴게요. 무엇을 도와드릴까요?
                </div>
                <div class="message msg-user">
                    신혼부부 전세자금 대출 자격 요건이 궁금해요.
                </div>
                <div class="message msg-bot">
                    네, 현재 사용자님의 연소득(7,500만원) 기준으로 확인해 본 결과, '신생아 특례 대출'과 '버팀목 전세자금 대출' 모두 가능권입니다. 특히 자녀 계획이 있으시다면...
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" placeholder="메시지를 입력하세요...">
                <button class="btn-send">전송</button>
            </div>
        </div>
    </div>

</body>
</html>
