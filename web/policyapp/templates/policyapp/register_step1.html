{% block content %}
<style>
    /* 배경 및 컨테이너 스타일 (기존 스타일 유지) */
    .register-container {
        max-width: 600px;
        margin: 50px auto;
        padding: 20px;
    }

    .terms-box {
        border: 1px solid #ddd;
        border-radius: 15px;
        padding: 30px;
        background: #fff;
        text-align: left;
    }

    .sub-terms-box {
        background: #f8f9fa;
        padding: 15px 20px;
        border-radius: 10px;
        margin: 10px 0;
    }

    .term-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
    }

    .req { color: #e74c3c; font-weight: bold; }
    .view-link { color: #666; font-size: 0.85rem; text-decoration: underline; }

    .info-notice {
        background: #fff;
        border: 1px solid #d1d8e0;
        border-radius: 10px;
        padding: 20px;
        margin-top: 30px;
        text-align: left;
        font-size: 0.9rem;
    }

   /* 버튼 공통 스타일 */
.btn-group {
    display: flex;
    /* 양끝 정렬 설정 */
    justify-content: space-between; 
    /* 버튼 사이의 최소 간격 */
    gap: 15px; 
    margin-top: 50px;
    width: 100%;
}

.btn-group button {
    /* 양끝 정렬 상태에서 버튼이 가득 차도록 설정 */
    flex: 1; 
    
    /* 크기 대폭 확장 */
    padding: 22px 0;      /* 상하 여백을 늘려 높이감 부여 */
    font-size: 1.15rem;   /* 글자 크기 시원하게 변경 */
    font-weight: 700;
    
    border-radius: 12px;
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
}

/* 동의하기 (메인) */
.btn-submit {
    background: #3498db;
    color: white;
    box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3); /* 살짝 그림자를 주어 더 커 보이게 함 */
}

/* 취소하기 (서브) */
.btn-cancel {
    background: #eeeeee;
    color: #444;
}

/* 버튼을 눌렀을 때 살짝 작아지는 효과 (클릭감) */
.btn-group button:active {
    transform: scale(0.98);
}

/* 모달창 디자인 추가 */
.modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); }
.modal-content { 
    background: white; margin: 10% auto; padding: 30px; border-radius: 20px; 
    width: 85%; max-width: 500px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
.modal-body { 
    max-height: 400px; overflow-y: auto; white-space: pre-line; 
    text-align: left; font-size: 14px; line-height: 1.6; color: #444; 
    margin: 20px 0; padding-right: 10px;
}
.close { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; color: #aaa; }
.close:hover { color: #000; }
.modal-btn { width: 100%; padding: 15px; background: #3498db; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }
</style>

<div class="register-container">
    <h2 class="title">약관동의</h2>

    <form method="post" id="terms-form">
        {% csrf_token %}
        <div class="terms-box glass-card">
            <!-- 모두 동의 -->
            <div class="term-item all-check">
                <label style="cursor: pointer;">
                    <input type="checkbox" id="check-all"> <strong>모두 동의합니다.</strong>
                </label>
            </div>
            <hr>

            <!-- 개별 약관 리스트 -->
            <div class="terms-list">
                <!-- 필수 항목들은 class="required-check"를 추가했습니다 -->
                <div class="term-item">
                    <label><input type="checkbox" name="term1" class="item-check required-check"> 이용 약관 <span class="req">(필수)</span></label>
                   <span class="view-link" onclick="openModal('term1')" style="cursor:pointer;">내용보기</span>
                </div>
                <div class="term-item">
                    <label><input type="checkbox" name="term2" class="item-check required-check"> 개인정보 수집 및 이용 동의 <span class="req">(필수)</span></label>
                    <span class="view-link" onclick="openModal('term2')" style="cursor:pointer;">내용보기</span>
                </div>
                <div class="term-item">
                    <label><input type="checkbox" name="term3" class="item-check"> 개인정보 수집 및 이용 동의 (선택)</label>
                    <span class="view-link" onclick="openModal('term3')" style="cursor:pointer;">내용보기</span>
                </div>
                
                <div class="sub-terms-box">
                    <div class="term-item">
                        <label><input type="checkbox" name="term_sub1" class="item-check required-check"> 행정정보 공동이용 사전동의 <span class="req">(필수)</span></label>
                        <span class="view-link" onclick="openModal('term4')" style="cursor:pointer;">내용보기</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="info-notice">
            <p>ℹ️ <strong>참고해 주세요</strong></p>
            <p>혜택알리미, 생활정보서비스 동의하면 다양한 서비스를 제공받을 수 있습니다.</p>
        </div>

        <div class="btn-group">
            <button type="button" class="login" onclick="history.back()">취소하기</button>
            <button type="submit" class="btn-submit">동의하기</button>
        </div>
    </form>
</div>

<script>
    const checkAll = document.getElementById('check-all');
    const itemChecks = document.querySelectorAll('.item-check');
    const requiredChecks = document.querySelectorAll('.required-check');
    const form = document.getElementById('terms-form');

    // 1. 모두 동의 로직
    checkAll.addEventListener('change', (e) => {
        itemChecks.forEach(check => {
            check.checked = e.target.checked;
        });
    });

    // 2. 개별 체크 해제 시 '모두 동의' 체크 해제
    itemChecks.forEach(check => {
        check.addEventListener('change', () => {
            const allChecked = Array.from(itemChecks).every(c => c.checked);
            checkAll.checked = allChecked;
        });
    });

    // 3. 필수 동의 체크 검사 (다음 페이지 이동 방지)
    form.addEventListener('submit', function(e) {
        let isAllRequiredChecked = true;
        
        requiredChecks.forEach(cb => {
            if (!cb.checked) {
                isAllRequiredChecked = false;
            }
        });

        if (!isAllRequiredChecked) {
            e.preventDefault(); // 폼 전송 중단
            alert('필수 약관에 모두 동의하셔야 다음 단계로 진행할 수 있습니다.');
        }
    });

    // 약관 데이터 정의
const termContents = {
    'term1': {
        title: '이용약관',
        body: "제1조 (목적)\n본 약관은 청춘로가 제공하는 청년 및 신혼부부 맞춤형 정책 정보 제공 서비스(이하 “서비스”)의 이용 조건 및 절차, 회사와 회원 간의 권리, 의무 및 책임 사항을 규정함을 목적으로 합니다.\n\n제2조 (회원의 의무)\n회원은 가입 시 아이디, 이름, 주소 등 실제 본인의 정보를 입력해야 합니다.\n타인의 정보를 도용하여 가입할 경우 서비스 이용이 제한될 수 있습니다.\n\n제3조(서비스 제공)\n회사는 회원에게 공공기관의 정책 매칭, 주거 지원 정보 안내 등의 서비스를 제공합니다."
    },
    'term2': {
        title: '개인정보 수집 및 이용 (필수)',
        body: "수집 항목:성명, 아이디, 비밀번호, 나이, 연소득, 거주지(시도, 시군구), 주민등록번호(본인인증용), 순자산, 부채, 청약 정보, 혼인 상황, 자녀 수, 무주택 기간 등\n\n목적: 회원 식별 및 가입 의사 확인\n\n사용자 조건(자산, 소득, 가구원 등)에 맞는 맞춤형 정책 매칭 및 추천 서비스 제공\n\n보유 기간: 회원 탈퇴 시까지(법령에 의해 보존이 필요한 경우 예외)"
    },
    'term3': {
        title: '개인정보 수집 및 이용 (선택)',
        body: "마케팅 활용 및 신규 정책 알림 서비스를 위해 휴대폰 번호 등을 수집합니다."
    },
    'term4': {
        title: '행정정보 공동이용 사전동의',
        body: "본인은 정책 수혜 자격 확인을 위해 주민등록 등·초본 및 소득 확인 증명서를 청춘로가 조회하는 것에 동의합니다.\n\n확인 정보:\n주민등록표 등·초본 (거주지 및 무주택 기간 확인)\n\n건강보험료 납부확인서 또는 소득확인증명서 (연소득 확인)\n\n이용 목적: 신청 가능한 청년·신혼부부 지원 정책 자격의 자동 검증 및 추천\n\n거부 시 불이익: 본 동의를 거부하실 경우, 수동으로 서류를 제출해야 하거나 정확한 정책 매칭 서비스 제공이 어려울 수 있습니다."
    }
};

// 모달 열기 함수
function openModal(termId) {
    const modal = document.getElementById('termsModal');
    document.getElementById('modalTitle').innerText = termContents[termId].title;
    document.getElementById('modalBody').innerText = termContents[termId].body;
    modal.style.display = 'block';
}

// 모달 닫기 함수
function closeModal() {
    document.getElementById('termsModal').style.display = 'none';
}

// 창 바깥 클릭 시 닫기
window.onclick = function(event) {
    const modal = document.getElementById('termsModal');
    if (event.target == modal) closeModal();
}
</script>
<div id="termsModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h3 id="modalTitle" style="margin-top:0; color:#333;">약관 제목</h3>
        <div id="modalBody" class="modal-body"></div>
        <button type="button" class="modal-btn" onclick="closeModal()">확인</button>
    </div>
</div>
{% endblock %}
