{% extends 'mainwindow/base.html' %}
{% load static %}

{% block title %}1:1 문의하기 - 딱맞춤{% endblock %}

{% block extra_css %}
<style>
    .form-container { max-width: 800px; margin: 60px auto; padding: 40px; background: white; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); }
    .form-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 30px; color: #1e293b; text-align: center; }
    
    .form-group { margin-bottom: 25px; }
    .form-label { display: block; font-weight: 700; color: #475569; margin-bottom: 10px; font-size: 0.95rem; }
    .form-control {
        width: 100%;
        padding: 15px;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-family: inherit;
        font-size: 1rem;
        transition: 0.3s;
    }
    .form-control:focus { border-color: #1a4f8b; outline: none; box-shadow: 0 0 0 4px rgba(26, 79, 139, 0.1); }
    
    .btn-submit {
        width: 100%;
        background: #1a4f8b;
        color: white;
        padding: 18px;
        border: none;
        border-radius: 15px;
        font-size: 1.1rem;
        font-weight: 800;
        cursor: pointer;
        transition: 0.3s;
    }
    .btn-submit:hover { background: #0f3661; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(26, 79, 139, 0.2); }
    
    .form-tip { font-size: 0.85rem; color: #94a3b8; margin-top: 10px; display: block; }
</style>
{% endblock %}

{% block content %}
<div class="form-container fade-in">
    <div class="form-title">✉️ 1:1 정책/사용 문의</div>
    
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">문의 제목</label>
            <input type="text" name="title" class="form-control" placeholder="문의 내용을 한 줄로 요약해 주세요" required>
        </div>
        
        <div class="form-group">
            <label class="form-label">문의 내용</label>
            <textarea name="content" class="form-control" rows="8" placeholder="상세한 문의 내용을 입력해 주세요. 정책 관련 문의 시 본인의 상황(연령, 소득 등)을 함께 적어주시면 더 정확한 답변이 가능합니다." required></textarea>
            <span class="form-tip">* 작성하신 내용은 관리자 확인 후 '나의 문의 내역'에서 답변을 확인하실 수 있습니다.</span>
        </div>
        
        <button type="submit" class="btn-submit">문의 등록하기 🚀</button>
        <div style="text-align: center; margin-top: 20px;">
            <a href="{% url 'support:support_home' %}" style="color: #64748b; text-decoration: none; font-size: 0.9rem;">취소하고 돌아가기</a>
        </div>
    </form>
</div>
{% endblock %}
