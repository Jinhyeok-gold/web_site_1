{% extends 'mainwindow/base.html' %}
{% load static %}

{% block title %}정보 수정 | 딱맞춤{% endblock %}

{% block extra_css %}
<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<link rel="stylesheet" href="{% static 'auth_mypage/css/edit_profile.css' %}">
{% endblock %}

{% block content %}
<div class="edit-profile-page">
    <div class="edit-card">
        <h2>정보 수정</h2>
        <form method="POST">
            {% csrf_token %}

            <div class="input-group">
                <label>이름</label>
                <input type="text" name="name" value="{{ user.last_name }}" required>
            </div>

            <div class="input-grid-2col">
                <div class="input-group">
                    <label>나이 (만)</label>
                    <input type="number" name="age" value="{{ profile.age|default:'' }}" placeholder="예: 25" min="0" max="120">
                </div>
                <div class="input-group">
                    <label>연소득 (만원)</label>
                    <input type="number" name="income" value="{{ profile.income|default:'' }}" placeholder="예: 3000" min="0">
                </div>
            </div>

            <div class="input-grid-2col">
                <div class="input-group">
                    <label>순자산 (만원)</label>
                    <input type="number" name="net_assets" value="{{ profile.net_assets|default:'' }}" min="0">
                </div>
                <div class="input-group">
                    <label>부채 (만원)</label>
                    <input type="number" name="debt" value="{{ profile.debt|default:'' }}" min="0">
                </div>
            </div>

            <div class="input-grid-2col">
                <div class="input-group">
                    <label>청약 납입 횟수 (회)</label>
                    <input type="number" name="subscription_count" value="{{ profile.subscription_count|default:'' }}" min="0">
                </div>
                <div class="input-group">
                    <label>청약 총 납입액 (만원)</label>
                    <input type="number" name="subscription_amount" value="{{ profile.subscription_amount|default:'' }}" min="0">
                </div>
            </div>

            <div class="input-grid-2col">
                <div class="input-group">
                    <label>자녀 수 (명)</label>
                    <input type="number" name="children_count" value="{{ profile.children_count|default:'0' }}" min="0">
                </div>
                <div class="input-group">
                    <label>무주택 기간 (년)</label>
                    <input type="number" name="homeless_period" value="{{ profile.homeless_period|default:'' }}" min="0">
                </div>
            </div>

            <div class="input-group">
                <label>혼인 상황</label>
                <select name="marital_status">
                    <option value="미혼" {% if profile.marital_status == "미혼" %}selected{% endif %}>미혼</option>
                    <option value="결혼예정" {% if profile.marital_status == "결혼예정" %}selected{% endif %}>결혼예정</option>
                    <option value="신혼부부" {% if profile.marital_status == "신혼부부" %}selected{% endif %}>신혼부부</option>
                    <option value="기혼" {% if profile.marital_status == "기혼" %}selected{% endif %}>기혼</option>
                </select>
            </div>

            <div class="input-group">
                <label>거주 지역</label>
                <input type="text" id="address_display" value="{{ profile.sido }} {{ profile.sigungu }}" readonly>
                <button type="button" class="btn-zip" onclick="execDaumPostcode()">주소 검색</button>
                <input type="hidden" name="sido" id="sido" value="{{ profile.sido }}">
                <input type="hidden" name="sigungu" id="sigungu" value="{{ profile.sigungu }}">
            </div>

            <div class="btn-group">
                <button type="submit" class="btn btn-save">저장하기</button>
                <a href="{% url 'policy:mypage' %}" class="btn btn-cancel">취소</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    function execDaumPostcode() {
        new daum.Postcode({
            oncomplete: function(data) {
                document.getElementById('sido').value = data.sido;
                document.getElementById('sigungu').value = data.sigungu;
                document.getElementById('address_display').value = data.sido + ' ' + data.sigungu;
            }
        }).open();
    }
</script>
{% endblock %}
