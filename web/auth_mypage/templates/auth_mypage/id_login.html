{% extends 'mainwindow/base.html' %}
{% load static %}

{% block title %}아이디 로그인 | 딱맞춤{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="{% static 'auth_mypage/css/id_login.css' %}">
{% endblock %}

{% block content %}
<div class="id-login-page">
    <div class="login-glass-card">

        <div class="avatar-badge">
            <i class="fas fa-user"></i>
        </div>

        <p class="login-eyebrow">Sign In</p>
        <h2>아이디 로그인</h2>

        <form method="POST" action="{% url 'policy:id_login' %}">
            {% csrf_token %}

            {% if error %}
            <div class="error-msg">
                <i class="fas fa-exclamation-circle"></i> {{ error }}
            </div>
            {% endif %}

            <div class="input-group">
                <input type="text" name="username" placeholder="아이디" required>
                <i class="fas fa-envelope input-icon"></i>
            </div>

            <div class="input-group">
                <input type="password" name="password" placeholder="비밀번호" required>
                <i class="fas fa-lock input-icon"></i>
            </div>

            <div class="login-options">
                <label class="save-id">
                    <input type="checkbox"> 아이디 저장
                </label>
                <span class="forgot-pw">비밀번호 재설정</span>
            </div>

            <button type="submit" class="submit-btn">LOGIN</button>
        </form>

        <div class="login-footer-links">
            계정이 없으신가요?
            <a href="{% url 'policy:register_step1' %}">회원가입</a>
            &nbsp;·&nbsp;
            <a href="{% url 'policy:guest_login' %}">비회원 로그인</a>
        </div>

    </div>
</div>
{% endblock %}
