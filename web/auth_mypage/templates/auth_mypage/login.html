{% extends 'mainwindow/base.html' %}
{% load static %}

{% block title %}로그인 | 딱맞춤{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="{% static 'auth_mypage/css/login.css' %}">
{% endblock %}

{% block content %}
<div class="login-select-page">
    <h1>로그인 방식을 선택해주세요</h1>
    <p class="page-sub">딱맞춤 서비스를 이용하려면 로그인이 필요합니다.</p>

    <div class="card-container">
        <!-- 아이디 로그인 카드 -->
        <div class="login-card login-card--id" onclick="location.href='{% url 'policy:id_login' %}'">
            <div class="icon-wrapper"><i class="fas fa-user"></i></div>
            <div class="card-title">아이디 로그인</div>
        </div>

        <!-- 비회원 로그인 카드 -->
        <div class="login-card login-card--guest" onclick="location.href='{% url 'policy:guest_login' %}'">
            <div class="icon-wrapper"><i class="fas fa-user-secret"></i></div>
            <div class="card-title">비회원 로그인</div>
        </div>
    </div>

    <p class="info-msg">
        <i class="fas fa-lock"></i>&nbsp;
        귀하의 정보는 동의 없이 공개되지 않으며, 개인정보 보호법에 의해 보호됩니다.
    </p>
</div>
{% endblock %}
