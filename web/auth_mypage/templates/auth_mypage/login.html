{% extends 'mainwindow/base.html' %}
{% load static %}

{% block title %}로그인 | 딱맞춤{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="{% static 'auth_mypage/css/login.css' %}">
{% endblock %}

{% block content %}
<div class="login-select-page">
    <h1>로그인 방식을 선택해주세요</h1>

    <div class="card-container">
        <div class="login-card" onclick="location.href='{% url 'policy:id_login' %}'">
            <span class="icon"><i class="fas fa-user-circle"></i></span>
            <div class="card-title">아이디 로그인</div>
        </div>
        <div class="login-card" onclick="location.href='{% url 'policy:guest_login' %}'">
            <span class="icon"><i class="fas fa-user-secret"></i></span>
            <div class="card-title">비회원 로그인</div>
        </div>
    </div>

    <p class="info-msg">
        <i class="fas fa-lock"></i> 귀하의 정보는 동의 없이 공개되지 않으며, 개인정보 보호법에 의해 보호되고 있습니다.
    </p>
</div>
{% endblock %}
