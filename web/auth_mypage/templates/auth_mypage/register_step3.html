{% load static %}<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>회원가입 Step 3 | 청춘로</title>
    <style>
        /* 기존 register_step2.html의 스타일과 동일하게 설정 */
        body {
            background: #ffffff;
            margin: 0; display: flex; justify-content: center; align-items: center;
            min-height: 120vh; padding: 50px 0; font-family: 'Pretendard', sans-serif;
        }
        .register-container { width: 100%; max-width: 500px; padding: 20px; }
        .glass-card-wide {
            background: #ffffff;
            padding: 40px; border-radius: 20px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }
        .field-group { margin-bottom: 20px; }
        .field-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; font-size: 14px; }
        input, select {
            width: 100%; padding: 12px 15px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.1);
            background: rgba(255, 255, 255, 0.9); box-sizing: border-box;
        }
        .step-indicator { text-align: center; margin-bottom: 20px; color: #1a4f8b; font-weight: bold; }
        h3 { border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 10px; margin-bottom: 20px; color: #333; }
        .btn-group { display: flex; gap: 10px; margin-top: 30px; }
        .btn { flex: 1; padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; border: none; cursor: pointer; }
        .btn-primary { background: #1a4f8b; color: white; }
    </style>
</head>
<body>
<div class="register-container">
    <div class="step-indicator">STEP 3. 상세 정보 입력 (마지막)</div>
    <form method="post" action="{% url 'policy:register_step3' %}" class="glass-card-wide">
        {% csrf_token %}
        
        <h3>경제 및 가구 정보</h3>
        
        <div class="field-group">
            <label>나이 (만)</label>
            <input type="number" name="age" placeholder="만 나이를 입력하세요" required min="0" max="120">
        </div>

        <div class="field-group">
            <label>연소득 (가구 합산, 만원)</label>
            <input type="number" name="income" placeholder="예: 4000" required min="0">
        </div>

        <div class="field-group">
            <label>순자산 규모 (만원)</label>
            <input type="number" name="net_assets" placeholder="예: 15000" required min="0">
        </div>

        <div class="field-group">
            <label>부채 규모 (만원)</label>
            <input type="number" name="debt" value="0" required min="0">
        </div>

        <div class="field-group">
            <label>청약통장 납입 횟수 (회)</label>
            <input type="number" name="subscription_count" required min="0">
        </div>

        <div class="field-group">
            <label>혼인상황</label>
            <select name="marital_status" required>
                <option value="미혼">미혼</option>
                <option value="결혼예정">결혼예정</option>
                <option value="신혼부부">신혼부부</option>
            </select>
        </div>

        <div class="field-group">
            <label>자녀수</label>
            <input type="number" name="children_count" value="0" required min="0">
        </div>

        <div class="field-group">
            <label>무주택기간 (년)</label>
            <input type="number" name="homeless_period" required min="0">
        </div>

        <div class="field-group" style="display: flex; gap: 20px; flex-wrap: wrap;">
            <div style="flex: 1; min-width: 140px;">
                <label>임신 여부</label>
                <select name="is_pregnant">
                    <option value="False">미해당</option>
                    <option value="True">임신중</option>
                </select>
            </div>
            <div style="flex: 1; min-width: 140px;">
                <label>생애최초 주택구입</label>
                <select name="is_first_home">
                    <option value="True">해당</option>
                    <option value="False">미해당</option>
                </select>
            </div>
            <div style="flex: 1; min-width: 140px;">
                <label>현재 무주택 여부</label>
                <select name="is_homeless">
                    <option value="True">무주택</option>
                    <option value="False">유주택</option>
                </select>
            </div>
        </div>

        <div class="btn-group">
            <button type="submit" class="btn btn-primary">가입 완료하기</button>
        </div>
    </form>
</div>
</body>
</html>
