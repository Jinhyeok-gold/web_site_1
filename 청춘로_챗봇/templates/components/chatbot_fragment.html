<div id="drawer-chatbot-container" class="drawer-content-pane">

        <div style="display: flex; align-items: center; gap: 15px;">

                <div style="width: 32px; height: 32px; background: var(--primary-gradient); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: white;">AI</div>

            </div>
            <button onclick="resetChat()" style="background: rgba(0,0,0,0.05); border: none; padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 800; color: var(--text-muted); cursor: pointer; transition: 0.2s;">초기화</button>

        <!-- 우측 여백 확보 (base.html의 닫기 버튼용) -->
        <div style="width: 40px;"></div>
    </div>

    <div id="chat-messages" class="chat-viewport">
        <div class="chat-bubble chat-bot">

        </div>
    </div>

    <div class="chat-input-area">
        <form onsubmit="handleChatSubmit(event)" id="drawer-chat-form">
            <input type="text" id="chat-input" placeholder="전문가에게 질문하기..." autocomplete="off">
            <button type="submit" id="chat-send">

        </form>
    </div>
